# Curated cams. The page opens on `default`; the rest are in the switcher.
# type: video    → file path or stream URL (m3u8/rtsp), opened via OpenCV
# type: snapshot → periodic-JPEG URL, polled every `interval`s (no ffmpeg)
default: local-day

cams:
  - id: local-day
    name: "Daytime Street"
    location: "bundled sample"
    type: video
    source: samples/traffic-day.mp4
    loop: true

  - id: local-night
    vibe: freeway
    name: "SR-99 @ S Lander St"
    location: "Seattle, WA — bundled"
    type: video
    source: samples/traffic.mp4
    loop: true

  - id: local-street
    vibe: downtown
    name: "Street-Level Drive"
    location: "bundled sample — close-up"
    type: video
    source: samples/street.mp4
    loop: true
    locale: japan

  # live YouTube street cams (resolved fresh each connect; may occasionally be offline)
  - id: miami-beach
    vibe: beach
    tz: America/New_York
    name: "South Beach"
    location: "Miami — live"
    type: youtube
    source: "https://www.youtube.com/watch?v=g5BS95j2rmM"
    locale: latin

