# Curated cams. The page opens on `default`; the rest are in the tab bar.
# type: video    → file path or stream URL (m3u8/rtsp), opened via OpenCV
# type: snapshot → periodic-JPEG URL, polled every `interval`s (no ffmpeg)
# type: youtube  → live YouTube URL, resolved to HLS fresh each connect
#
# Every entry was verified live 2026-07-01: stream resolves, camera is fixed,
# cars pass, and the scene's light matches the cam's local clock (the tell
# that catches "24/7 live" loops). Curated for quality — high-res street-level
# views only; frozen DOT cams and tiny 352×240 feeds were cut.
default: miami-beach

cams:
