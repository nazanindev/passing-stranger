<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>car-stories</title>
<style>
  :root{--bg:#0e0d0b;--panel:#141310;--ink:#f2ede2;--dim:#8b857a;--hair:rgba(242,237,226,.12)}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:"Iowan Old Style",Georgia,"Times New Roman",serif;overflow:hidden}
  #app{display:flex;height:100%}
  #main{position:relative;flex:1;display:flex;align-items:center;justify-content:center;
    overflow:hidden;min-width:0}
  #cv{display:block;max-width:100%;max-height:100vh}
  header{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:baseline;
    gap:1rem;padding:.9rem 1.1rem;background:linear-gradient(180deg,rgba(14,13,11,.85),transparent)}
  header h1{font-size:1rem;margin:0;font-weight:600;letter-spacing:.02em}
  header .sub{color:var(--dim);font-size:.8rem;font-style:italic}
  nav{margin-left:auto;display:flex;gap:.35rem;flex-wrap:wrap;max-width:62%;justify-content:flex-end}
  nav button{background:transparent;border:1px solid var(--hair);color:var(--ink);font:inherit;
    font-size:.72rem;padding:.24rem .55rem;border-radius:999px;cursor:pointer;opacity:.65;transition:.15s}
  nav button:hover{opacity:1}
  nav button.active{opacity:1;background:rgba(242,237,226,.1);border-color:rgba(242,237,226,.55)}
  #status{position:absolute;bottom:.5rem;left:.9rem;z-index:5;color:var(--dim);
    font-size:.66rem;font-family:ui-monospace,Menlo,monospace}
  aside{width:300px;flex:none;background:var(--panel);border-left:1px solid var(--hair);
    display:flex;flex-direction:column;height:100%}
  aside .cap{padding:.7rem 1rem .55rem;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;
    color:var(--dim);font-family:ui-monospace,Menlo,monospace;border-bottom:1px solid var(--hair);
    display:flex;justify-content:space-between;align-items:center}
  #clipbtn{background:transparent;border:1px solid rgba(242,237,226,.3);color:var(--ink);
    font:inherit;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;
    padding:.28rem .6rem;border-radius:999px;cursor:pointer;transition:.15s}
  #clipbtn:hover{background:rgba(242,237,226,.12);border-color:rgba(242,237,226,.6)}
  #clipbtn:active{transform:scale(.95)}
  #grid{flex:1;overflow-y:auto;padding:.55rem;display:grid;grid-template-columns:1fr 1fr;gap:.5rem;align-content:start}
  #grid a{display:block;border:1px solid var(--hair);border-radius:.35rem;overflow:hidden;
    line-height:0;animation:in .5s ease}
  #grid img{width:100%;display:block}
  @keyframes in{from{opacity:0;transform:translateY(-6px)}to{opacity:1}}
  #foot{padding:.5rem 1rem;color:var(--dim);font-size:.66rem;font-style:italic;border-top:1px solid var(--hair)}
</style>
</head>
<body>
<div id="app">
  <div id="main">
    <header><h1>car-stories</h1><span class="sub" id="camline">—</span><nav id="nav"></nav></header>
    <img id="cv" alt="" />
    <div id="status">connecting…</div>
  </div>
  <aside>
    <div class="cap"><span>the gallery</span><button id="clipbtn">✦ clip</button></div>
    <div id="grid"></div>
    <div id="foot">every life invented · none of it is real</div>
  </aside>
</div>

<script>
const cv=document.getElementById('cv'), nav=document.getElementById('nav');
const camline=document.getElementById('camline'), statusEl=document.getElementById('status');
const grid=document.getElementById('grid'), clipbtn=document.getElementById('clipbtn');
let currentCam=null, gallerySeen=new Set(), retryTimer=null;

function addTile(url, front){
  if(gallerySeen.has(url)) return;
  gallerySeen.add(url);
  const a=document.createElement('a'); a.href=url; a.target='_blank';
  a.innerHTML='<img src="'+url+'">';
  front ? grid.prepend(a) : grid.appendChild(a);
  while(grid.children.length>60) grid.lastChild.remove();
}

clipbtn.onclick=async ()=>{
  if(!cv.naturalWidth) return;
  clipbtn.textContent='✦ clipped';
  setTimeout(()=>clipbtn.textContent='✦ clip', 900);
  const c=document.createElement('canvas');
  c.width=cv.naturalWidth; c.height=cv.naturalHeight;
  c.getContext('2d').drawImage(cv,0,0);
  const b64=c.toDataURL('image/jpeg',0.9).split(',')[1];
  const r=await fetch('/clip',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({jpeg:b64})});
  const {url}=await r.json();
  addTile(url, true);
};

// native MJPEG into a plain <img> — the browser handles every frame in C++;
// no websocket, no per-frame JS, nothing to leak
function connect(camId){
  clearTimeout(retryTimer);
  statusEl.textContent='connecting…';
  const q='?cam='+encodeURIComponent(camId||'')+'&t='+Date.now();
  cv.onload=()=>statusEl.textContent='live';
  cv.onerror=()=>{statusEl.textContent='reconnecting…';
    retryTimer=setTimeout(()=>connect(currentCam),2000);};
  cv.src='/stream'+q;
}

async function pollGallery(){
  try{
    const items=await (await fetch('/gallery')).json();
    for(const it of [...items].reverse()) addTile(it.url, true);  // newest first
  }catch(e){}
}

async function init(){
  const cfg=await (await fetch('/cams')).json();
  currentCam=cfg.default;
  for(const c of cfg.cams){
    const b=document.createElement('button');
    b.textContent=c.name; b.className=c.id===currentCam?'active':'';
    b.onclick=()=>{currentCam=c.id;[...nav.children].forEach(x=>x.classList.remove('active'));
      b.classList.add('active');camline.textContent=c.name+' · '+(c.location||'');connect(c.id);};
    nav.appendChild(b);
    if(c.id===currentCam) camline.textContent=c.name+' · '+(c.location||'');
  }
  connect(currentCam);
  pollGallery(); setInterval(pollGallery, 3000);
}
init();
</script>
</body>
</html>
