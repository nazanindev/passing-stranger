<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>passing stranger</title>
<style>
  :root{--bg:#0e0d0b;--panel:#141310;--ink:#f2ede2;--dim:#8b857a;--hair:rgba(242,237,226,.12)}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:"Iowan Old Style",Georgia,"Times New Roman",serif;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100%}
  header{flex:none;display:flex;align-items:center;gap:1rem;padding:.6rem 1.1rem;
    background:var(--bg);border-bottom:1px solid var(--hair)}
  header h1{font-size:1rem;margin:0;font-weight:600;letter-spacing:.02em}
  header .epi{color:var(--dim);font-size:.68rem;font-style:italic;margin-top:.15rem}
  nav{margin-left:auto;display:flex;gap:.35rem;flex-wrap:wrap;justify-content:flex-end}
  nav button{background:transparent;border:1px solid var(--hair);color:var(--ink);font:inherit;
    font-size:.72rem;padding:.24rem .55rem;border-radius:999px;cursor:pointer;opacity:.65;transition:.15s}
  nav button:hover{opacity:1}
  nav button.active{opacity:1;background:rgba(242,237,226,.1);border-color:rgba(242,237,226,.55)}
  nav button.gal{margin-left:.6rem}
  #main{position:relative;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;
    overflow:hidden}
  #cv{display:block;max-width:100%;max-height:100%}
  #grid{position:absolute;inset:0;overflow-y:auto;padding:.8rem;display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.6rem;align-content:start;
    background:var(--panel)}
  #grid[hidden]{display:none}
  #grid a{display:block;border:1px solid var(--hair);border-radius:.35rem;overflow:hidden;
    line-height:0;animation:in .5s ease}
  #grid img{width:100%;display:block}
  @keyframes in{from{opacity:0;transform:translateY(-6px)}to{opacity:1}}
  footer{flex:none;display:flex;align-items:center;gap:.55rem;padding:.42rem 1.1rem;
    border-top:1px solid var(--hair);color:var(--dim);
    font-size:.66rem;font-family:ui-monospace,Menlo,monospace}
  #livedot{font-size:.5rem;line-height:1}
  #camline{color:var(--dim)}
  #foot{margin-left:auto;display:flex;align-items:center;gap:.8rem;
    font-family:"Iowan Old Style",Georgia,serif;font-style:italic}
  #clipbtn{background:transparent;border:1px solid rgba(242,237,226,.3);color:var(--ink);
    font-family:ui-monospace,Menlo,monospace;font-style:normal;font-size:.62rem;
    letter-spacing:.08em;padding:.22rem .55rem;border-radius:999px;cursor:pointer;transition:.15s}
  #clipbtn:hover{background:rgba(242,237,226,.12);border-color:rgba(242,237,226,.6)}
  #clipbtn:active{transform:scale(.95)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div><h1>passing stranger</h1>
      <div class="epi">I am to see to it that I do not lose you</div></div>
    <nav id="nav"></nav>
  </header>
  <div id="main">
    <img id="cv" alt="" />
    <div id="grid" hidden></div>
  </div>
  <footer>
    <span id="livedot" hidden>🔴</span>
    <span id="statustext">connecting…</span>
    <span id="camline"></span>
    <div id="foot"><span>every life invented · none of it is real</span>
      <button id="clipbtn" hidden>✦ don't lose</button></div>
  </footer>
</div>

<script>
const cv=document.getElementById('cv'), nav=document.getElementById('nav');
const grid=document.getElementById('grid'), clipbtn=document.getElementById('clipbtn');
const statustext=document.getElementById('statustext'), camline=document.getElementById('camline');
const livedot=document.getElementById('livedot');
let currentCam=null, gallerySeen=new Set(), retryTimer=null, mode='stream';
const isCurator=['localhost','127.0.0.1'].includes(location.hostname);

function addTile(url, front){
  if(gallerySeen.has(url)) return;
  gallerySeen.add(url);
  const a=document.createElement('a'); a.href=url; a.target='_blank';
  a.innerHTML='<img src="'+url+'">';
  front ? grid.prepend(a) : grid.appendChild(a);
  while(grid.children.length>60) grid.lastChild.remove();
}

clipbtn.onclick=async ()=>{
  if(!cv.naturalWidth) return;
  clipbtn.textContent='✦ not lost';
  setTimeout(()=>clipbtn.textContent="✦ don't lose", 900);
  const c=document.createElement('canvas');
  c.width=cv.naturalWidth; c.height=cv.naturalHeight;
  c.getContext('2d').drawImage(cv,0,0);
  const b64=c.toDataURL('image/jpeg',0.9).split(',')[1];
  const r=await fetch('/clip',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({jpeg:b64})});
  const {url}=await r.json();
  addTile(url, true);
};

// native MJPEG into a plain <img> — the browser handles every frame in C++;
// no websocket, no per-frame JS, nothing to leak
function connect(cam){
  clearTimeout(retryTimer);
  mode='stream';
  grid.hidden=true; cv.style.display='block';
  camline.textContent='· '+cam.name+' · '+(cam.location||'');
  statustext.textContent='connecting…'; livedot.hidden=true;
  clipbtn.hidden=!isCurator;
  const q='?cam='+encodeURIComponent(cam.id||'')+'&t='+Date.now();
  cv.onload=()=>{statustext.textContent='live'; livedot.hidden=false;};
  cv.onerror=()=>{statustext.textContent='reconnecting…'; livedot.hidden=true;
    retryTimer=setTimeout(()=>connect(cam),2000);};
  cv.src='/stream'+q;
}

function showGallery(){
  clearTimeout(retryTimer);
  mode='gallery';
  cv.onload=null; cv.onerror=null;
  cv.src=''; cv.style.display='none';       // release the stream — the cam session winds down
  grid.hidden=false;
  livedot.hidden=true; statustext.textContent='the gallery'; camline.textContent='';
  clipbtn.hidden=true;
}

async function pollGallery(){
  try{
    const items=await (await fetch('/gallery')).json();
    for(const it of [...items].reverse()) addTile(it.url, true);  // newest first
  }catch(e){}
}

function setActive(btn){
  [...nav.children].forEach(x=>x.classList.remove('active'));
  btn.classList.add('active');
}

async function init(){
  const cfg=await (await fetch('/cams')).json();
  let first=null;
  for(const c of cfg.cams){
    const b=document.createElement('button');
    b.textContent=c.name;
    b.onclick=()=>{setActive(b); currentCam=c; connect(c);};
    nav.appendChild(b);
    if(c.id===cfg.default){first=b; currentCam=c;}
  }
  const g=document.createElement('button');
  g.textContent='the gallery'; g.className='gal';
  g.onclick=()=>{setActive(g); showGallery();};
  nav.appendChild(g);
  if(first){first.classList.add('active'); connect(currentCam);}
  pollGallery(); setInterval(pollGallery, 3000);
}
init();
</script>
</body>
</html>
