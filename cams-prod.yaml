    region: philly
    vibe: downtown
    tz: America/New_York
    name: "2nd St @ King St"
    location: "Wilmington, DE — DelDOT public feed"
    type: video
    source: "https://video.deldot.gov/live/NCAM201.stream/playlist.m3u8"

